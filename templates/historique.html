<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Historique des analyses</title>
    <link rel="stylesheet" href="../static/style.css">

    <style>

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:#3498db;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        a{
            text-decoration:none;
            color:white;
        }

        .retour{
            margin-top:20px;
            display:inline-block;
            background:#3498db;
            padding:10px 20px;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Historique des analyses</h1>

<table>

<tr>

<th>ID</th>
<th>Date</th>
<th>Texte</th>
<th>Dates</th>
<th>Montants</th>
<th>Années</th>
<th>Téléphones</th>
<th>Autres nombres</th>

</tr>

{% for analyse in analyses %}

<tr>

<td>{{ analyse[0] }}</td>
<td>{{ analyse[7] }}</td>
<td>{{ analyse[1] }}</td>
<td>{{ analyse[2] }}</td>
<td>{{ analyse[3] }}</td>
<td>{{ analyse[4] }}</td>
<td>{{ analyse[5] }}</td>
<td>{{ analyse[6] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a class="retour" href="/">Retour</a>

</div>

</body>

</html>
